<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#b44a2c"/>
<title>日本自驾 · 时间轴 · 2026.11</title>
<style>
:root{
  --bg:#faf6ec;
  --bg2:#f3ecd9;
  --card:#ffffff;
  --ink:#1f1d1a;
  --muted:#7a756a;
  --faint:#a89f8f;
  --line:rgba(31,29,26,.08);
  --line2:rgba(31,29,26,.14);
  --primary:#b44a2c;
  --primary-lt:rgba(180,74,44,.1);
  --primary-bd:rgba(180,74,44,.25);
  --gold:#a8802a;
  --ok:#4a8a3a;
  --sh:0 4px 18px rgba(31,29,26,.06);
  --sh2:0 8px 30px rgba(31,29,26,.1);
  --r:18px;
  --r-sm:12px;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#141619;
    --bg2:#1a1d21;
    --card:rgba(255,255,255,.04);
    --ink:#ece4d3;
    --muted:#9b948a;
    --faint:#6b6459;
    --line:rgba(236,228,211,.08);
    --line2:rgba(236,228,211,.14);
    --primary:#e07659;
    --primary-lt:rgba(224,118,89,.14);
    --primary-bd:rgba(224,118,89,.35);
    --gold:#e0b968;
    --ok:#7bc26a;
    --sh:0 4px 18px rgba(0,0,0,.4);
    --sh2:0 8px 30px rgba(0,0,0,.55);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  background:
    radial-gradient(ellipse at top,var(--bg2),var(--bg) 60%);
  background-attachment:fixed;
  color:var(--ink);
  font-family:-apple-system,"SF Pro Text","PingFang SC","Noto Sans SC",system-ui,sans-serif;
  font-size:16px;
  line-height:1.6;
  min-height:100dvh;
  padding:0 0 80px;
  padding-top:env(safe-area-inset-top);
}

/* ═══ STICKY HEADER ═══ */
.topbar{
  position:sticky;top:0;z-index:50;
  background:color-mix(in srgb,var(--bg) 92%,transparent);
  backdrop-filter:saturate(180%) blur(14px);
  -webkit-backdrop-filter:saturate(180%) blur(14px);
  border-bottom:1px solid var(--line);
  padding:12px 20px;
  display:flex;align-items:center;gap:12px;
}
.brand{flex:1;min-width:0}
.brand-t{font-size:15px;font-weight:700;font-family:"Noto Serif SC",Georgia,serif;line-height:1.2}
.brand-s{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.02em}
.today-btn{
  height:38px;padding:0 16px;border:none;border-radius:99px;
  background:var(--primary);color:#fff;
  font-size:13px;font-weight:600;
  box-shadow:0 4px 12px rgba(180,74,44,.3);
  cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.today-btn:active{transform:scale(.95)}

/* ═══ HERO ═══ */
.hero{
  max-width:600px;margin:24px auto 8px;padding:0 20px;
}
.hero-eyebrow{
  font-size:11px;color:var(--primary);font-weight:600;
  letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;
}
.hero-title{
  font-size:30px;font-weight:700;line-height:1.1;
  font-family:"Noto Serif SC",Georgia,serif;margin-bottom:6px;
}
.hero-sub{font-size:14px;color:var(--muted);margin-bottom:20px}
.hero-stats{
  display:flex;gap:10px;margin-bottom:12px;
}
.hero-stat{
  flex:1;background:var(--card);
  border:1px solid var(--line);border-radius:var(--r-sm);
  padding:12px 10px;text-align:center;box-shadow:var(--sh);
}
.hs-n{font-size:22px;font-weight:700;color:var(--primary);font-family:"Noto Serif SC",serif;line-height:1}
.hs-l{font-size:11px;color:var(--muted);margin-top:4px}

/* ═══ DAY CHIPS ═══ */
.chips{
  max-width:600px;margin:16px auto 0;padding:0 20px;
  display:flex;gap:8px;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;scroll-snap-align:start;
  background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:8px 14px;
  font-size:12px;color:var(--muted);
  cursor:pointer;transition:.15s;text-decoration:none;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  min-width:54px;
}
.chip b{font-size:14px;font-weight:700;color:var(--ink);font-family:"Noto Serif SC",serif;line-height:1}
.chip:active{transform:scale(.92)}
.chip.today{background:var(--primary);border-color:var(--primary)}
.chip.today b,.chip.today{color:#fff}

/* ═══ TIMELINE ═══ */
.timeline{
  max-width:600px;margin:8px auto 0;padding:0 20px;
  position:relative;
}
.day{
  margin-top:40px;position:relative;scroll-margin-top:80px;
}
.day:first-of-type{margin-top:28px}

/* day header */
.day-head{
  display:flex;align-items:flex-start;gap:14px;margin-bottom:6px;
  padding-bottom:14px;border-bottom:1px solid var(--line2);
}
.day-num{
  flex:0 0 auto;width:54px;height:54px;border-radius:50%;
  background:var(--primary);color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:"Noto Serif SC",serif;line-height:1;
  box-shadow:0 6px 16px rgba(180,74,44,.28);
}
.day-num b{font-size:20px;font-weight:700}
.day-num s{font-size:9px;text-decoration:none;margin-top:2px;opacity:.85}
.day-info{flex:1;min-width:0;padding-top:2px}
.day-title{font-size:18px;font-weight:700;font-family:"Noto Serif SC",serif;line-height:1.25;margin-bottom:4px}
.day-sub{font-size:12px;color:var(--muted);line-height:1.55}
.day-sub .sep{opacity:.4;margin:0 6px}
.day-hotel{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;color:var(--gold);margin-top:5px;
}

/* friend-tip (strategy as friendly voice) */
.tip{
  margin:14px 0 6px;padding:12px 14px 12px 16px;
  background:var(--primary-lt);border-radius:var(--r-sm);
  border-left:3px solid var(--primary);
  font-size:13px;line-height:1.7;color:var(--ink);
}
.tip::before{content:"💬 ";font-size:12px}

/* closed warning */
.warn{
  margin:10px 0;padding:10px 14px;
  background:rgba(230,160,40,.12);border:1px solid rgba(230,160,40,.3);
  border-radius:var(--r-sm);font-size:12px;color:#a06600;
}
@media (prefers-color-scheme:dark){.warn{color:#e0b968}}

/* ═══ EVENTS ═══ */
.events{position:relative;margin-top:18px;padding-left:44px}
.events::before{
  content:"";position:absolute;left:16px;top:10px;bottom:10px;
  width:2px;background:var(--line2);
}
.event{
  position:relative;margin-bottom:14px;
}
.event:last-child{margin-bottom:0}
.ev-time{
  position:absolute;left:-44px;top:14px;
  width:34px;height:34px;border-radius:50%;
  background:var(--card);border:2px solid var(--line2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;z-index:2;
}
.ev-clock{
  position:absolute;left:-44px;top:52px;
  width:34px;text-align:center;
  font-size:10px;color:var(--faint);font-variant-numeric:tabular-nums;
}
.ev-card{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:14px 16px;
  box-shadow:var(--sh);transition:.2s;
}
.ev-card.done{opacity:.55}
.ev-card.done .ev-name{text-decoration:line-through}
.ev-tag{
  display:inline-block;font-size:10px;font-weight:600;
  padding:2px 8px;border-radius:20px;margin-bottom:6px;
  letter-spacing:.04em;text-transform:uppercase;
}
.tag-sight{background:var(--primary-lt);color:var(--primary)}
.tag-meal{background:rgba(168,128,42,.14);color:var(--gold)}
.tag-drive{background:rgba(74,138,120,.14);color:#4a8a78}
.tag-hotel{background:rgba(106,90,155,.14);color:#6a5a9b}
@media (prefers-color-scheme:dark){
  .tag-drive{background:rgba(120,180,160,.14);color:#86c2a8}
  .tag-hotel{background:rgba(150,130,200,.14);color:#9c88c8}
}
.ev-name{font-size:15px;font-weight:700;color:var(--ink);line-height:1.35;margin-bottom:3px}
.ev-sub{font-size:11px;color:var(--gold);font-weight:500;margin-bottom:6px}
.ev-desc{font-size:13px;color:var(--muted);line-height:1.65}
.ev-actions{
  display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;
}
.btn{
  flex:1;min-height:40px;padding:0 14px;
  border-radius:10px;border:1px solid var(--line2);
  background:transparent;color:var(--ink);
  font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  text-decoration:none;
}
.btn:active{transform:scale(.96)}
.btn-map{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-done{flex:0 0 auto;min-width:44px;padding:0 12px}
.btn-done.on{background:var(--ok);border-color:var(--ok);color:#fff}

/* budget card */
.budget{
  max-width:600px;margin:40px auto 0;padding:0 20px;
}
.bud-card{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);
}
.bud-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.bud-title{font-size:15px;font-weight:700;font-family:"Noto Serif SC",serif}
.bud-meta{font-size:11px;color:var(--muted);margin-top:2px}
.bud-total{font-size:22px;font-weight:700;color:var(--primary);font-family:"Noto Serif SC",serif;line-height:1}
.bud-totlbl{font-size:10px;color:var(--muted);text-align:right;margin-top:3px}
.bud-row{
  display:flex;justify-content:space-between;gap:10px;
  padding:10px 0;border-top:1px solid var(--line);font-size:12px;
}
.bud-row:first-of-type{border-top:none}
.bud-row .r-name{flex:1;min-width:0;color:var(--ink);font-weight:500}
.bud-row .r-date{color:var(--muted);font-size:11px;white-space:nowrap}
.bud-row .r-amt{color:var(--primary);font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums}

/* footer */
.footer{
  max-width:600px;margin:40px auto 0;padding:0 20px;
  text-align:center;font-size:11px;color:var(--faint);line-height:1.8;
}
.footer a{color:var(--muted);text-decoration:none}

/* small screen tune */
@media (max-width:380px){
  .hero-title{font-size:26px}
  .events{padding-left:40px}
  .ev-time,.ev-clock{left:-40px}
}
</style>
</head>

{d:4,date:"11/18",week:"周三",title:"白川乡日游 → 金泽",hotel:"Hotel Vista Kanazawa",drive:"约 170 km",

  {t:"11:00",i:"🗻",k:"sight",n:"荻町城迹展望台",d:"俯瞰合掌村全景,上午光线最佳。步行 20 分钟或接驳车。",u:"Ogimachi+Castle+Observation+Deck"},

  {t:"15:30",i:"🐟",k:"sight",n:"近江町市场",d:"金泽厨房,下午仍开着,螃蟹、海胆、寒鰤鱼应有尽有。",u:"Omicho+Market+Kanazawa"},
  {t:"17:00",i:"🏮",k:"sight",n:"东茶屋街",d:"傍晚灯笼亮起最有气氛,步行或短程计程车即达。",u:"Higashi+Chaya+District+Kanazawa"},

 events:[
  {t:"08:00",i:"🌿",k:"sight",n:"兼六园",d:"日本三大名园之一。11 月下旬「雪吊」(防雪绳)开始挂,是秋末特有景观。8 点开园即入人少。门票 ¥320。",u:"Kenrokuen+Kanazawa"},
  {t:"09:30",i:"🏯",k:"sight",n:"金泽城公园",d:"与兼六园相邻,免费入园。石川门、三十间长屋保存完整。",u:"Kanazawa+Castle+Park"},
  {t:"11:30",i:"🍛",k:"meal",n:"ゴーゴーカレー",sub:"金泽咖喱",d:"金泽 B 级美食代表,浓稠黑咖喱配炸猪排。",u:"ゴーゴーカレー+金沢"},
  {t:"13:30",i:"🏮",k:"sight",n:"主计町茶屋街",d:"比东茶屋街更安静小众,沿浅野川而建,白天几乎无人。",u:"Kazuemachi+Chaya+District"},
  {t:"15:00",i:"🍰",k:"meal",n:"Le Musée de H",sub:"法式甜点 × 金箔",d:"辻口博启甜品名店,金箔蛋糕马卡龙,下午茶氛围绝佳。",u:"Le+Musée+de+H+金沢"},
  {t:"19:00",i:"🔥",k:"meal",n:"いたる 本店",sub:"炉端烧 / 加贺料理",d:"金泽居酒屋名店,北陆海鲜烤物配地酒。需预约。",u:"いたる+本店+金沢"}
 ]},

{d:8,date:"11/22",week:"周日",title:"奈良井宿 → 松本",hotel:"Dormy Inn Matsumoto",drive:"约 120 km",

 events:[

  {t:"21:00",i:"🛏",k:"hotel",n:"Rembrandt Premium Fuji",d:"富士山景观酒店,运气好次日清晨见富士山全景。",u:"Rembrandt+Premium+Fuji+Gotemba"}

const TAG_CLS={sight:'tag-sight',meal:'tag-meal',drive:'tag-drive',hotel:'tag-hotel'};
const TAG_LBL={sight:'景点',meal:'美食',drive:'驾驶',hotel:'酒店'};

// ══ RENDER ══
function renderChips(){
  const c=document.getElementById('chips');
  DAYS.forEach(d=>{
    const a=document.createElement('a');
    a.className='chip';a.href='#d'+d.d;
    a.innerHTML=`<b>D${d.d}</b><span>${d.date.replace('11/','')}</span>`;
    c.appendChild(a);
  });
}

function mapUrl(u){
  return u.startsWith('http')?u:(M+u);
}

function renderTimeline(){
  const tl=document.getElementById('tl');
  DAYS.forEach(d=>{
    const sec=document.createElement('section');
    sec.className='day';sec.id='d'+d.d;

    sec.innerHTML=`
      <div class="day-head">
        <div class="day-num"><b>D${d.d}</b><s>${d.date}</s></div>
        <div class="day-info">
          <div class="day-title">${d.title}</div>
          <div class="day-sub">${d.week}<span class="sep">·</span>${d.drive}</div>
          <div class="day-hotel">🛏 ${d.hotel}</div>
        </div>
      </div>
      <div class="tip">${d.tip}</div>
      <div class="events" id="ev-${d.d}"></div>
    `;
    tl.appendChild(sec);

    const ev=sec.querySelector('#ev-'+d.d);
    d.events.forEach((e,i)=>{
      const key='done_'+d.d+'_'+i;
      const done=localStorage.getItem(key)==='1';
      const div=document.createElement('div');
      div.className='event';
      div.innerHTML=`
        <div class="ev-time">${e.i}</div>
        <div class="ev-clock">${e.t}</div>
        <div class="ev-card ${done?'done':''}" data-key="${key}">
          <span class="ev-tag ${TAG_CLS[e.k]}">${TAG_LBL[e.k]}</span>
          <div class="ev-name">${e.n}</div>
          ${e.sub?`<div class="ev-sub">${e.sub}</div>`:''}
          <div class="ev-desc">${e.d}</div>
          <div class="ev-actions">
            <a class="btn btn-map" href="${mapUrl(e.u)}" target="_blank" rel="noopener">🗺 导航</a>
            <button class="btn btn-done ${done?'on':''}" onclick="toggleDone(this,'${key}')">${done?'✓':'○'}</button>
          </div>
        </div>
      `;
      ev.appendChild(div);
    });
  });
}

function toggleDone(btn,key){
  const card=btn.closest('.ev-card');
  const isDone=card.classList.toggle('done');
  btn.classList.toggle('on',isDone);
  btn.textContent=isDone?'✓':'○';
  if(isDone)localStorage.setItem(key,'1');
  else localStorage.removeItem(key);
}

function renderBudget(){
  const b=document.getElementById('budRows');
  BUDGET.forEach(r=>{
    const div=document.createElement('div');
    div.className='bud-row';
    div.innerHTML=`
      <div class="r-name">${r.n}</div>
      <div class="r-date">${r.dt} · ${r.nt}晚</div>
      <div class="r-amt">${r.amt}</div>
    `;
    b.appendChild(div);
  });
}

function jumpToday(){
  // 旅行期:2026-11-15 到 2026-11-28
  const now=new Date();
  const start=new Date('2026-11-15');
  const diff=Math.floor((now-start)/(1000*60*60*24));
  let target;
  if(diff<0)target=1;              // 还没开始 → D1
  else if(diff>=14)target=14;      // 已结束 → D14
  else target=diff+1;              // 进行中
  const el=document.getElementById('d'+target);
  if(el){
    el.scrollIntoView({behavior:'smooth',block:'start'});
    // highlight chips
    document.querySelectorAll('.chip').forEach((c,i)=>{
      c.classList.toggle('today',i===target-1);
    });
  }
}

renderChips();
renderTimeline();
renderBudget();
